<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" role="img" aria-labelledby="title desc">
  <title id="title">Concurrent drought and heatwave diagram</title>
  <desc id="desc">Educational diagram showing a drought and a heatwave occurring at the same time and producing amplified compound impacts.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8d47a"/>
      <stop offset="1" stop-color="#fff7e0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#6b4b1f" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="920" height="540" rx="22" fill="#fffaf0"/>
  <rect x="34" y="34" width="852" height="472" rx="18" fill="url(#sky)" stroke="#ead39a" stroke-width="2"/>
  <text x="460" y="79" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#513b18">Concurrent Droughts and Heatwaves</text>
  <text x="460" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#6b5a32">Two hazards happen at the same time, so their impacts can reinforce each other.</text>
  <circle cx="180" cy="190" r="55" fill="#f05a28" filter="url(#shadow)"/>
  <g stroke="#f05a28" stroke-width="8" stroke-linecap="round">
    <line x1="180" y1="105" x2="180" y2="74"/>
    <line x1="180" y1="306" x2="180" y2="274"/>
    <line x1="95" y1="190" x2="64" y2="190"/>
    <line x1="296" y1="190" x2="264" y2="190"/>
    <line x1="119" y1="129" x2="96" y2="106"/>
    <line x1="241" y1="251" x2="264" y2="274"/>
    <line x1="241" y1="129" x2="264" y2="106"/>
    <line x1="119" y1="251" x2="96" y2="274"/>
  </g>
  <text x="180" y="364" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#7c2d12">Heatwave</text>
  <text x="180" y="392" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#7c2d12">Very high temperature</text>
  <path d="M400 355c-20-58-10-116 29-167 47-61 112-70 155-34 50 42 55 124 21 200z" fill="#d7a84b" filter="url(#shadow)"/>
  <path d="M377 377c76-19 155-22 234-9" fill="none" stroke="#8c6a2d" stroke-width="8" stroke-linecap="round"/>
  <path d="M437 322l44-42 39 39 45-50" fill="none" stroke="#8c6a2d" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M506 357c-8-43 8-88 44-123" fill="none" stroke="#8c6a2d" stroke-width="7" stroke-linecap="round"/>
  <text x="500" y="425" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#74551f">Drought</text>
  <text x="500" y="453" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#74551f">Low soil moisture and water stress</text>
  <g transform="translate(680 160)" filter="url(#shadow)">
    <rect x="0" y="0" width="165" height="178" rx="18" fill="#ffffff" stroke="#e6b85e" stroke-width="2"/>
    <path d="M36 112c24-32 45-49 74-58 5 31-5 62-31 83-20 16-40 18-43-25z" fill="#9fbf5a"/>
    <path d="M78 54c-2 38-7 68-25 100" fill="none" stroke="#6f8e37" stroke-width="7" stroke-linecap="round"/>
    <path d="M90 78c18 22 31 43 42 70" fill="none" stroke="#6f8e37" stroke-width="7" stroke-linecap="round"/>
    <path d="M45 154h75" stroke="#8b5e34" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="762" y="378" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#5c4033">Compound Impact</text>
  <text x="762" y="406" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5c4033">Higher stress on crops, water,</text>
  <text x="762" y="428" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5c4033">ecosystems, and people</text>
  <path d="M293 190h82" stroke="#7b5a1f" stroke-width="8" stroke-linecap="round"/>
  <path d="M366 170l28 20-28 20" fill="none" stroke="#7b5a1f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M614 250h63" stroke="#7b5a1f" stroke-width="8" stroke-linecap="round"/>
  <path d="M668 230l28 20-28 20" fill="none" stroke="#7b5a1f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="334" y="165" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#6b4b1f">same period</text>
</svg>
