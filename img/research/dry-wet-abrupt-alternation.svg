<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" role="img" aria-labelledby="title desc">
  <title id="title">Dry-wet abrupt alternation diagram</title>
  <desc id="desc">Educational diagram showing a rapid transition from dry conditions to heavy rainfall and flooding.</desc>
  <defs>
    <linearGradient id="dryWet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff2c9"/>
      <stop offset="0.48" stop-color="#fff8e8"/>
      <stop offset="0.52" stop-color="#e8f6ff"/>
      <stop offset="1" stop-color="#cde9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1f4d6b" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="920" height="540" rx="22" fill="#f5fbff"/>
  <rect x="34" y="34" width="852" height="472" rx="18" fill="url(#dryWet)" stroke="#bad8e9" stroke-width="2"/>
  <text x="460" y="79" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#153d4d">Dry-Wet Abrupt Alternation</text>
  <text x="460" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#375d68">A rapid shift from dry conditions to intense rainfall can create sudden risk.</text>
  <line x1="460" y1="146" x2="460" y2="452" stroke="#ffffff" stroke-width="6" stroke-dasharray="14 12"/>
  <text x="230" y="162" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#7b4f15">Dry Phase</text>
  <text x="690" y="162" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#14537a">Wet Phase</text>
  <g transform="translate(92 200)" filter="url(#shadow)">
    <rect x="0" y="0" width="280" height="170" rx="18" fill="#fffdf5" stroke="#dfbd72" stroke-width="2"/>
    <path d="M28 126c54-21 105-22 154-5 31 11 54 10 72-4" fill="none" stroke="#bd8740" stroke-width="10" stroke-linecap="round"/>
    <path d="M50 138l32-29 26 30 34-34 30 36 42-38" fill="none" stroke="#8d6231" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="218" cy="50" r="28" fill="#f6b84b"/>
    <g stroke="#f6b84b" stroke-width="5" stroke-linecap="round">
      <line x1="218" y1="12" x2="218" y2="0"/>
      <line x1="218" y1="100" x2="218" y2="88"/>
      <line x1="180" y1="50" x2="168" y2="50"/>
      <line x1="268" y1="50" x2="256" y2="50"/>
    </g>
  </g>
  <text x="232" y="404" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#6f4b1e">Soils dry out, vegetation is stressed,</text>
  <text x="232" y="428" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#6f4b1e">and runoff pathways can change.</text>
  <g transform="translate(548 200)" filter="url(#shadow)">
    <rect x="0" y="0" width="280" height="170" rx="18" fill="#f7fcff" stroke="#8bc7e6" stroke-width="2"/>
    <path d="M24 126c39-25 77-25 116-3 43 24 80 18 117-13v48H24z" fill="#5aa7d6"/>
    <path d="M54 87c25-22 54-22 86 0 31 21 61 20 88-3" fill="none" stroke="#2476a8" stroke-width="8" stroke-linecap="round"/>
    <g fill="#2f8cc4">
      <path d="M74 25c12 18 21 31 21 43a21 21 0 0 1-42 0c0-12 9-25 21-43z"/>
      <path d="M142 20c12 18 21 31 21 43a21 21 0 0 1-42 0c0-12 9-25 21-43z"/>
      <path d="M210 28c12 18 21 31 21 43a21 21 0 0 1-42 0c0-12 9-25 21-43z"/>
    </g>
  </g>
  <text x="688" y="404" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#155779">Heavy rainfall arrives quickly,</text>
  <text x="688" y="428" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#155779">raising flood and erosion risk.</text>
  <path d="M378 284h133" stroke="#34495e" stroke-width="9" stroke-linecap="round"/>
  <path d="M500 261l35 23-35 23" fill="none" stroke="#34495e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="456" y="255" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#34495e">rapid transition</text>
  <rect x="312" y="457" width="296" height="36" rx="18" fill="#ffffff" stroke="#c5d6df" stroke-width="2"/>
  <text x="460" y="482" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#2e5060">Key idea: timing matters as much as intensity.</text>
</svg>
